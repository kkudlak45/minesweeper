<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #info {
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        #game-container {
            display: inline-block;
            border: 3px solid #999;
            background-color: #bdbdbd;
            padding: 10px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(25, 30px);
            gap: 1px;
            background-color: #7b7b7b;
            padding: 1px;
        }

        .cell {
            width: 30px;
            height: 30px;
            background-color: #c0c0c0;
            border: 1px solid #fff;
            border-right-color: #7b7b7b;
            border-bottom-color: #7b7b7b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            user-select: none;
        }

        .cell:hover {
            box-shadow: inset 0 0 2px 2px white;
        }

        .cell.revealed {
            background-color: #e0e0e0;
            border: 1px solid #7b7b7b;
        }

        .cell.flagged {
            background-color: #c0c0c0;
            color: red;
        }

        .cell.mine {
            background-color: #ff0000;
        }

        .cell.revealed.mine {
            background-color: #ff0000;
        }

        .cell.mine-win {
            background-color: #00ff00;
        }

        .cell.false-flag {
            background-color: #ff6b6b;
            border: 2px solid #ff0000;
        }

        .cell.correct-flag {
            background-color: #4caf50;
        }

        .cell.count-1 {
            color: blue;
        }

        .cell.count-2 {
            color: green;
        }

        .cell.count-3 {
            color: red;
        }

        .cell.count-4 {
            color: darkblue;
        }

        .cell.count-5 {
            color: darkred;
        }

        .cell.count-6 {
            color: cyan;
        }

        .cell.count-7 {
            color: black;
        }

        .cell.count-8 {
            color: gray;
        }

        #reset {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="info">
        <span>Mines: 100 | Flags: <span id="flag-count">0</span></span>
    </div>
    <div id="game-container">
        <div id="grid"></div>
    </div>
    <button id="reset">New Game</button>

    <script src="index.js"></script>
</body>

</html>
